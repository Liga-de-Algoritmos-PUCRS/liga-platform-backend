services:
  postgres:
    image: postgres:15
    container_name: liga-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: liga-db
    ports:
      - "5432:5432"
    volumes:
      - postgres-liga-data:/var/lib/postgresql/data

volumes:
  postgres-liga-data:
    driver: local
