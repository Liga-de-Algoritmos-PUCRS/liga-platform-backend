<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Novo Relato de Bug - Liga de Algoritmos</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #f3f4f6;
        font-family: 'Nunito Sans', sans-serif;
        color: #1f2937;
      }
      .container {
        max-width: 560px;
        margin: 40px auto;
        background-color: #ffffff;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      }
      .hero {
        background: linear-gradient(135deg, #7d157d 0%, #39073a 100%);
        padding: 48px 32px;
        text-align: center;
        color: white;
      }
      .content {
        padding: 40px 32px;
      }
      .report-box {
        background-color: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 20px;
        margin-top: 24px;
      }
      .label {
        font-size: 12px;
        font-weight: 700;
        color: #7d157d;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 4px;
      }
      .value {
        font-size: 15px;
        color: #1f2937;
        margin-bottom: 16px;
      }
      .description {
        background-color: #ffffff;
        border: 1px solid #f3f4f6;
        padding: 16px;
        border-radius: 6px;
        white-space: pre-wrap;
        color: #4b5563;
        font-size: 14px;
        line-height: 1.6;
      }
      .footer {
        padding: 24px;
        text-align: center;
        font-size: 12px;
        color: #9ca3af;
        border-top: 1px solid #e5e7eb;
      }
      h1 {
        margin: 0;
        font-size: 24px;
        font-weight: 700;
      }
      p {
        line-height: 1.6;
        color: #4b5563;
      }
    </style>
  </head>
  <body>
    <div style="background-color: #f3f4f6; padding: 20px">
      <table width="100%" cellpadding="0" cellspacing="0">
        <tr>
          <td align="center">
            <div class="container">
              <div class="hero">
                <h1>Novo Bug Reportado 🐞</h1>
              </div>

              <div class="content">
                <p>
                  Um novo problema foi reportado através da plataforma. Abaixo estão os detalhes
                  enviados pelo usuário:
                </p>

                <div class="report-box">
                  <div class="label">Nome do Reportador</div>
                  <div class="value"><strong>{{NAME}}</strong></div>

                  <div class="label">Email de Contato</div>
                  <div class="value">{{EMAIL}}</div>

                  <div class="label">Descrição do Problema</div>
                  <div class="description">{{DESCRIPTION}}</div>
                </div>
              </div>

              <div class="footer">
                <p>&copy; Liga de Algoritmos - PUCRS</p>
              </div>
            </div>
          </td>
        </tr>
      </table>
    </div>
  </body>
</html>
