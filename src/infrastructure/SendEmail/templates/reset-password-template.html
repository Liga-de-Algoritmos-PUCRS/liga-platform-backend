<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Redefinir Senha</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #f3f4f6;
        font-family: 'Nunito Sans', sans-serif;
        color: #1f2937;
      }
      .container {
        max-width: 560px;
        margin: 40px auto;
        background-color: #ffffff;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      }
      .header {
        padding: 32px 0;
        text-align: center;
        border-bottom: 4px solid #7d157d;
      }
      .content {
        padding: 40px 32px;
      }
      .code-box {
        background-color: #39073a;
        border-radius: 8px;
        padding: 20px;
        text-align: center;
        margin: 24px 0;
      }
      .code {
        font-size: 32px;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: 6px;
        margin: 0;
        font-family: monospace;
      }
      .footer {
        padding: 24px;
        text-align: center;
        font-size: 12px;
        color: #9ca3af;
        background-color: #f9fafb;
      }
      h1 {
        color: #7d157d;
        font-size: 24px;
        margin: 0;
      }
      p {
        line-height: 1.6;
        color: #4b5563;
      }
    </style>
  </head>
  <body>
    <div style="background-color: #f3f4f6; padding: 20px">
      <table width="100%" cellpadding="0" cellspacing="0">
        <tr>
          <td align="center">
            <div class="container">
              <div class="header">
                <h1 style="color: #7d157d; font-weight: 800; font-size: 28px">
                  Recuperação de Senha
                </h1>
              </div>
              <div class="content">
                <p>Olá <strong>{{USER}}</strong>,</p>
                <p>
                  Recebemos uma solicitação para redefinir a sua senha. Use o código abaixo para
                  continuar:
                </p>

                <div class="code-box">
                  <p class="code">{{CODE}}</p>
                </div>

                <p style="font-size: 14px; color: #6b7280">
                  Se você não solicitou uma nova senha, pode ignorar este e-mail com segurança. Sua
                  conta continua protegida.
                </p>
              </div>
              <div class="footer">Liga de Algoritmos - PUCRS</div>
            </div>
          </td>
        </tr>
      </table>
    </div>
  </body>
</html>
