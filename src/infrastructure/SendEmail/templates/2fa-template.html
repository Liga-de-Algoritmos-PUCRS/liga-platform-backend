<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <meta name="supported-color-schemes" content="light" />
    <title>Seu código de acesso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #f3f4f6;
        font-family: 'Nunito Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
        color: #1f2937;
      }
      .container {
        max-width: 560px;
        margin: 40px auto;
        background-color: #ffffff;
        border-radius: 12px;
        overflow: hidden;
        box-shadow:
          0 4px 6px -1px rgba(0, 0, 0, 0.1),
          0 2px 4px -1px rgba(0, 0, 0, 0.06);
      }
      .header {
        background-color: #2563eb;
        padding: 32px 0;
        text-align: center;
      }
      .content {
        padding: 40px 32px;
        text-align: center;
      }
      .code-box {
        background-color: #f0f9ff;
        border: 1px dashed #2563eb;
        border-radius: 8px;
        padding: 24px;
        margin: 32px 0;
        display: inline-block;
        min-width: 200px;
      }
      .code {
        font-size: 36px;
        font-weight: 700;
        color: #2563eb;
        letter-spacing: 8px;
        margin: 0;
        font-family: monospace;
      }
      .footer {
        padding: 24px;
        text-align: center;
        font-size: 12px;
        color: #9ca3af;
        border-top: 1px solid #e5e7eb;
        background-color: #f9fafb;
      }
      h1 {
        margin: 0;
        color: #ffffff;
        font-size: 24px;
        font-weight: 700;
      }
      p {
        line-height: 1.6;
        margin-bottom: 16px;
        color: #4b5563;
      }
      strong {
        color: #111827;
      }
    </style>
  </head>
  <body>
    <div style="background-color: #f3f4f6; padding: 20px">
      <table width="100%" cellpadding="0" cellspacing="0" role="presentation">
        <tr>
          <td align="center">
            <div class="container">
              <div class="header">
                <h1 style="color: #ffffff">Bee CRM</h1>
              </div>

              <div class="content">
                <h2 style="margin-top: 0; color: #111827; font-size: 20px">
                  Seu código de verificação
                </h2>
                <p>Olá <strong>{{USER}}</strong>,</p>
                <p>Para concluir o seu acesso, utilize o código abaixo:</p>

                <div class="code-box">
                  <p class="code">{{CODE}}</p>
                </div>

                <p style="font-size: 14px">
                  Este código expira em breve. Se você não solicitou este código, ignore este
                  e-mail.
                </p>
              </div>

              <div class="footer">
                <p style="margin: 0">&copy; 2024 Bee CRM. Todos os direitos reservados.</p>
              </div>
            </div>
          </td>
        </tr>
      </table>
    </div>
  </body>
</html>
