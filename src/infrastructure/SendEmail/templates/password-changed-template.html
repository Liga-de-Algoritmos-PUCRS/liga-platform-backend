<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Senha Alterada</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #f3f4f6;
        font-family: 'Nunito Sans', sans-serif;
        color: #1f2937;
      }
      .container {
        max-width: 560px;
        margin: 40px auto;
        background-color: #ffffff;
        border-radius: 12px;
        overflow: hidden;
        border-top: 5px solid #2563eb;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      }
      .content {
        padding: 40px 32px;
      }
      .icon {
        width: 64px;
        height: 64px;
        background-color: #ecfdf5;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px auto;
        color: #2563eb;
        font-size: 32px;
      }
      .footer {
        padding: 24px;
        text-align: center;
        font-size: 12px;
        color: #9ca3af;
        background-color: #f9fafb;
      }
      h1 {
        text-align: center;
        color: #111827;
        font-size: 24px;
        margin-bottom: 24px;
      }
      p {
        line-height: 1.6;
        color: #4b5563;
      }
    </style>
  </head>
  <body>
    <div style="background-color: #f3f4f6; padding: 20px">
      <table width="100%" cellpadding="0" cellspacing="0">
        <tr>
          <td align="center">
            <div class="container">
              <div class="content">
                <div style="text-align: center; margin-bottom: 20px">
                  <img
                    src="https://img.icons8.com/ios-filled/100/10b981/lock.png"
                    alt="Segurança"
                    width="50"
                    style="display: inline-block"
                  />
                </div>

                <h1>Sua senha foi alterada</h1>

                <p>Olá <strong>{{USER}}</strong>,</p>
                <p>Confirmamos que a senha da sua conta foi alterada com sucesso.</p>
                <p>
                  Se não foi você que realizou esta ação, entre em contato com o nosso suporte
                  imediatamente.
                </p>
              </div>

              <div class="footer">
                <p>Equipe Bee CRM</p>
              </div>
            </div>
          </td>
        </tr>
      </table>
    </div>
  </body>
</html>
